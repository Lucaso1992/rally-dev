<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RALLY - Gestión de la Demanda</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Arial', sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 60%, #fff5f5 100%);
      min-height: 100vh;
      color: #2d2d2d;
    }

    .container {
      width: auto;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 36px 40px 32px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 220px;
      height: 220px;
      background: rgba(220, 38, 38, 0.12);
      border-radius: 50%;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -60px;
      right: 80px;
      width: 140px;
      height: 140px;
      background: rgba(220, 38, 38, 0.07);
      border-radius: 50%;
    }

    h1 {
      text-align: left;
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: #ffffff;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    h1 span {
      color: #ef4444;
      font-style: italic;
    }

    .header-subtitle {
      color: rgba(255,255,255,0.55);
      font-size: 0.9rem;
      font-weight: 400;
      margin: 0;
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .body-content {
      padding: 36px 40px;
    }

    .upload-zone {
      border: 2px dashed #e2e8f0;
      border-radius: 14px;
      padding: 32px 24px;
      text-align: center;
      background: #f8fafc;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      position: relative;
    }

    .upload-zone:hover {
      border-color: #ef4444;
      background: #fff5f5;
    }

    .upload-zone.file-loaded {
      border-color: #10b981;
      border-style: solid;
      background: #f0fdf4;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .upload-label {
      display: block;
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 12px;
    }

    .upload-label strong {
      color: #ef4444;
    }

    .file-loaded-info {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px 16px;
      background: #dcfce7;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #065f46;
    }

    .file-loaded-info.visible {
      display: flex;
    }

    .file-loaded-info .check-icon {
      width: 18px;
      height: 18px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-loaded-info .check-icon::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .buttons button {
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
      /* flex: 1; */
      min-width: 160px;
    }

    .buttons button#processFile {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
    }

    .buttons button#processFile:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
    }

    .buttons button#processFile:active {
      transform: translateY(0);
    }

    .buttons button#downloadExcel {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
    }

    .buttons button#downloadExcel:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
    }

    .buttons button:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .message {
      margin-top: 18px;
      font-size: 0.92rem;
      font-weight: 500;
      padding: 12px 18px;
      border-radius: 10px;
      display: none;
    }

    .message.error {
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      display: block;
    }

    .message.success {
      color: #065f46;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      display: block;
    }

    .divider {
      height: 1px;
      background: #f1f5f9;
      margin: 32px 0;
    }

    #previewContainer h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 0 0 16px 0;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #1a1a2e;
      color: rgba(255,255,255,0.85);
      padding: 13px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    thead th:first-child {
      border-radius: 0;
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #f8fafc;
      color: #374151;
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:nth-child(even) {
      background: #fafbfd;
    }

    tbody tr:hover {
      background: #fff5f5;
      transition: background 0.15s;
    }

    tbody td:first-child {
      font-family: 'Courier New', monospace;
      font-weight: 600;
      font-size: 0.85rem;
      color: #ef4444;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge-US { background: #eff6ff; color: #1d4ed8; }
    .badge-DE { background: #f5f3ff; color: #6d28d9; }
    .badge-TS { background: #fff7ed; color: #c2410c; }
    .badge-default { background: #f1f5f9; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span>RALLY</span> — Gestión de la Demanda</h1>
      <p class="header-subtitle">Procesador de demanda · Agile Planning</p>
    </div>

    <div class="body-content">
      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">📂</span>
        <span class="upload-label">Arrastra un archivo CSV aquí o <strong>haz clic para seleccionar!</strong></span>
        <input type="file" id="csvFile" accept=".csv">
        <div class="file-loaded-info" id="fileLoadedInfo">
          <div class="check-icon"></div>
          <span id="fileLoadedName">archivo.csv cargado correctamente</span>
        </div>
      </div>

      <div class="buttons">
        <button id="processFile">⚙ Procesar archivo</button>
        <button id="downloadExcel" disabled>↓ Descargar Excel</button>
      </div>

      <div id="message" class="message"></div>

      <div class="divider"></div>

      <div id="previewContainer">
        <h2>Vista previa de los datos procesados</h2>
        <div class="table-wrapper">
          <table id="previewTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Value Stream</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Estado global para los datos procesados ──────────────────────────────
    let processedData = [];
    let typeCounts = {};
    let valueStreamCounts = {};
    let stateCounts = {};

    const valueStreamCategories = [
      { category: "otros servicios", keywords: [] },
      { category: "empresas", keywords: ["empresa", "business"] },
      { category: "prestamos e hipotecas", keywords: ["préstamo", "hipoteca", "loan", "mortgage"] },
      { category: "onboarding", keywords: ["onboarding"] },
      { category: "seguros", keywords: ["seguro", "insurance"] },
      { category: "cuentas y tarjetas", keywords: ["cuenta", "tarjeta", "account", "card"] },
      { category: "ahorro e inversiones", keywords: ["ahorro", "inversión", "saving", "investment"] },
      { category: "plataforma transversal", keywords: ["plataforma", "platform"] },
      { category: "pagos transaccionales", keywords: ["pago", "transacción", "payment", "transaction"] }
    ];

    function classifyValueStream(tags, name) {
      const allKeywords = tags.split(";").concat(name.split(" "));
      for (const { category, keywords } of valueStreamCategories) {
        if (keywords.some(keyword => allKeywords.some(word => word.toLowerCase().includes(keyword)))) {
          return category;
        }
      }
      return "otros servicios";
    }

    function getBadgeClass(type) {
      if (type === 'US') return 'badge badge-US';
      if (type === 'DE') return 'badge badge-DE';
      if (type === 'TS') return 'badge badge-TS';
      return 'badge badge-default';
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = 'message ' + type;
    }

    // ── Notificación al seleccionar archivo ───────────────────────────────────
    document.getElementById('csvFile').addEventListener('change', function () {
      const file = this.files[0];
      const uploadZone = document.getElementById('uploadZone');
      const fileLoadedInfo = document.getElementById('fileLoadedInfo');
      const fileLoadedName = document.getElementById('fileLoadedName');

      if (file) {
        uploadZone.classList.add('file-loaded');
        fileLoadedInfo.classList.add('visible');
        fileLoadedName.textContent = '"' + file.name + '" cargado correctamente';
      } else {
        uploadZone.classList.remove('file-loaded');
        fileLoadedInfo.classList.remove('visible');
      }
    });

    // ── Procesar CSV ──────────────────────────────────────────────────────────
    document.getElementById('processFile').addEventListener('click', () => {
      const fileInput = document.getElementById('csvFile');
      const file = fileInput.files[0];
      const previewTableBody = document.querySelector('#previewTable tbody');
      previewTableBody.innerHTML = '';

      const messageEl = document.getElementById('message');
      messageEl.textContent = '';
      messageEl.className = 'message';

      if (!file) {
        showMessage('Por favor, selecciona un archivo CSV.', 'error');
        return;
      }

      // Resetear estado global
      processedData = [];
      typeCounts = { US: 0, DE: 0, TS: 0 };
      valueStreamCounts = {};
      stateCounts = {};

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          const data = results.data;

          data.forEach(row => {
            const id = row['Formatted ID'] || '';
            const name = row['Name'] || 'N/A';
            const tags = row['Tags'] || 'N/A';
            const flowState = row['Flow State'] || 'N/A';

            const type = id.slice(0, 2);
            if (!['US', 'DE', 'TS'].includes(type) || flowState === "Accepted") return;

            const valueStream = classifyValueStream(tags, name);

            processedData.push({
              ID: id,
              Nombre: name,
              Tipo: type,
              ValueStream: valueStream,
              Estado: flowState
            });

            typeCounts[type] = (typeCounts[type] || 0) + 1;
            valueStreamCounts[valueStream] = (valueStreamCounts[valueStream] || 0) + 1;
            stateCounts[flowState] = (stateCounts[flowState] || 0) + 1;
          });

          processedData.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + row.ID + '</td>' +
              '<td>' + row.Nombre + '</td>' +
              '<td><span class="' + getBadgeClass(row.Tipo) + '">' + row.Tipo + '</span></td>' +
              '<td>' + row.ValueStream + '</td>' +
              '<td>' + row.Estado + '</td>';
            previewTableBody.appendChild(tr);
          });

          document.getElementById('downloadExcel').disabled = false;
          showMessage('Archivo procesado con éxito. ' + processedData.length + ' registros encontrados.', 'success');
        },
        error: function() {
          showMessage('Error al procesar el archivo CSV.', 'error');
        }
      });
    });

    // ── Descargar Excel — listener fijo, usa estado global ────────────────────
    document.getElementById('downloadExcel').addEventListener('click', () => {
      if (!processedData.length) return;

      try {
        const workbook = XLSX.utils.book_new();

        const cleanDataSheet = XLSX.utils.json_to_sheet(processedData);
        XLSX.utils.book_append_sheet(workbook, cleanDataSheet, 'Datos Limpios');

        const summaryData = [
          { Categoria: 'Tipo US', Conteo: typeCounts.US || 0 },
          { Categoria: 'Tipo DE', Conteo: typeCounts.DE || 0 },
          { Categoria: 'Tipo TS', Conteo: typeCounts.TS || 0 },
          ...Object.keys(valueStreamCounts).map(stream => ({
            Categoria: 'Value Stream: ' + stream,
            Conteo: valueStreamCounts[stream]
          })),
          ...Object.keys(stateCounts).map(state => ({
            Categoria: 'Estado: ' + state,
            Conteo: stateCounts[state]
          }))
        ];

        const summarySheet = XLSX.utils.json_to_sheet(summaryData);
        XLSX.utils.book_append_sheet(workbook, summarySheet, 'Resumen');

        XLSX.writeFile(workbook, 'Datos_Procesados.xlsx');
        showMessage('Archivo Excel generado con éxito.', 'success');
      } catch (err) {
        showMessage('Error al generar el Excel: ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
